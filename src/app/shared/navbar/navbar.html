                    <!-- Unread Count Badge -->
                    <span *ngIf="unreadCount > 0"
                        class="absolute -top-1 -right-1 inline-flex items-center justify-center w-4 h-4 text-xs font-bold text-white bg-red-600 rounded-full">
                        {{ unreadCount }}
                    </span>
                </button>

                <!-- Dropdown Notifications -->
                <div *ngIf="showNotificationList"
                    class="absolute right-0 mt-2 z-10 bg-white divide-y divide-gray-100 rounded-lg shadow-lg w-64 dark:bg-gray-700">

                    <ul class="py-2 text-sm text-gray-700 dark:text-gray-200 max-h-64 overflow-y-auto">
                        <li *ngFor="let noti of notifications">
                            <div
                                class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white cursor-pointer">
                                <div class="flex justify-between items-center">
                                    <span [ngClass]="{'font-semibold': !noti.isRead}">{{ noti.message }}</span>
                                    <button (click)="deleteNotification(noti.id)"
                                        class="text-red-400 text-xs hover:underline">X</button>
                                </div>
                                <p class="text-xs text-gray-400">{{ noti.createdAt | date:'short' }}</p>
                            </div>
                        </li>
                    </ul>

                    <div class="px-4 py-2 text-center">
                        <button (click)="markAllAsRead()" class="text-blue-500 text-sm hover:underline">
                            Mark all as read
                        </button>
                    </div>
                </div>
            </div>
